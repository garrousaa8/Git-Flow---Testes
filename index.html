<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <form id="cadastro">
    <h1>Formulário de Cadastro</h1>

    <div class="grupo-formulario">
      <label for="nome">Nome</label>
      <div class="container-entrada">
        <input type="text" id="nome" placeholder="Digite seu nome">
        <div id="error-nome" class="mensagem-erro"></div>
      </div>
    </div>

    <div class="grupo-formulario">
      <label for="email">Email</label>
      <div class="container-entrada">
        <input type="email" id="email" placeholder="Digite seu email">
        <div id="error-email" class="mensagem-erro"></div>
      </div>
    </div>

    <div class="grupo-formulario">
      <label for="senha">Senha</label>
      <div class="container-entrada">
        <input type="password" id="senha" placeholder="Digite sua senha">
        <span class="alternar-senha" onclick="alternarSenha()">
          <span id="iconeSenha" class="material-icons">visibility</span>
        </span>
      </div>
      <div id="error-senha" class="mensagem-erro"></div>
    </div>

    <div class="grupo-formulario">
      <label for="confirmar">Confirmar Senha</label>
      <div class="container-entrada">
        <input type="password" id="confirmar" placeholder="Confirme sua senha">
        <span class="alternar-senha" onclick="alternarConfirmar()">
          <span id="iconeConfirmar" class="material-icons">visibility</span>
        </span>
      </div>
      <div id="error-confirmar" class="mensagem-erro"></div>
    </div>

    <button type="submit">Cadastrar</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
